# project-profile.yaml
schema_version: "4.0"
tool_version: "<tool-version>"
layer: "<frontend|bff|backend|multi-layer>"
project: "<project>"
last_verified: "<YYYY-MM-DD>"
verify_cadence: "14d"
owner: "<team>"

reference_scope:
  authority: "single_repo"     # 当前 _prd-tools/reference/ 只对本仓事实负责
  repo_role: "<frontend|bff|backend|multi-layer>"
  owns:
    - "facts verified in this repository"
    - "contracts where this repository is producer or verified consumer"
    - "playbooks executable by this repository's owners"
  does_not_own:
    - "other repositories' internal implementation"
    - "cross-repo contracts without producer or consumer owner confirmation"
    - "team-level taxonomy that has not been accepted by platform governance"
  team_reference_ready: false

team_reference:
  # ── 成员仓配置 ──
  upstream_repo: ""                                      # e.g. "git@git.xxx:dive-team-reference.git"
  upstream_local_path: ""                                # local clone path, e.g. "../dive-team-reference"
  inherit_scopes:
    - domain_terms                                       # inherit 05-domain terms
    - contracts_cross_repo                               # inherit team_reference_candidate contracts
    - coding_rules_fatal                                 # inherit fatal rules
  last_synced: ""
  # ── 团队仓配置（仅团队仓填写）──
  # member_repos:                                        # 团队聚合的成员仓列表
  #   - repo: ""                                         # 仓库名
  #     local_path: ""                                   # 本地路径（有则优先用）
  #     remote_url: ""                                   # 远程 git URL（local_path 不可用时备用）
  #     branch: "HEAD"                                   # 可选，指定分支
  #     layer: ""                                        # frontend | bff | backend
  #     role: ""                                         # producer | consumer | middleware | peer
  # aggregation_policy:                                  # 聚合策略
  #   contracts: "union_by_id"                           # 同 ID 合并 producer/consumers/checked_by
  #   domain_terms: "union_dedupe"                       # 去重合并
  #   coding_rules: "fatal_cross_layer"                  # 只聚合跨层 fatal 规则
  #   playbooks: "cross_layer_only"                      # 只聚合跨层 playbook

related_repositories:
  - repo: ""
    role: "<frontend|bff|backend|external>"
    relationship: "<upstream|downstream|consumer|producer|peer>"
    verification: "confirmed|needs_confirmation|unknown"
    owner_to_confirm: ""
    evidence: []

tech_stack:
  languages: []
  frameworks: []
  package_managers: []
  build_commands: []
  test_commands: []

entrypoints:
  runtime: []
  api: []
  ui: []
  jobs: []
  config: []

capability_surfaces:
  - id: "SURFACE-001"
    layer: "<frontend|bff|backend>"
    surface: ""
    responsibility: ""
    entrypoints: []
    key_files: []
    symbols: []
    contract_refs: []
    status: "candidate | verified | negative_search"
    evidence: []
    confidence: "high | medium | low"

candidate_paths:
  frontend: []
  bff: []
  backend: []

unknowns: []
