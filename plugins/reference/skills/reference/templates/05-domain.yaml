    rule: ""
    business_justification: ""
    evidence:
      - "EV-001"

# 历史决策
decision_log:
  - id: "<DECISION-001>"
    decision: ""
    reason: ""
    date: ""
    evidence:
      - "EV-001"

milestones: []
known_ambiguities: []
