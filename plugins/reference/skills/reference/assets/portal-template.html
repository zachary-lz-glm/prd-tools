<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}}</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f8f9fa;color:#1a1a2e;line-height:1.6}
.topnav{position:sticky;top:0;z-index:100;background:#fff;border-bottom:1px solid #e0e0e0;padding:12px 24px;display:flex;align-items:center;gap:16px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.topnav h1{font-size:18px;font-weight:600;color:#1a1a2e;white-space:nowrap}
.topnav nav{display:flex;gap:4px;flex-wrap:wrap}
.topnav nav a{padding:6px 14px;border-radius:8px;font-size:13px;color:#555;text-decoration:none;cursor:pointer;transition:all .15s}
.topnav nav a:hover{background:#e8eaf6;color:#1a1a2e}
.topnav nav a.active{background:#1a1a2e;color:#fff}
.container{max-width:1200px;margin:0 auto;padding:24px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.card{background:#fff;border-radius:8px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.card .label{font-size:12px;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.card .value{font-size:20px;font-weight:600;color:#1a1a2e}
.card .value.badge{font-size:13px;padding:3px 10px;border-radius:12px;display:inline-block}
.badge-pass{background:#e8f5e9;color:#2e7d32}
.badge-warn{background:#fff3e0;color:#e65100}
.badge-fail{background:#ffebee;color:#c62828}
.badge-info{background:#e3f2fd;color:#1565c0}
.section{display:none;background:#fff;border-radius:8px;padding:24px;box-shadow:0 1px 3px rgba(0,0,0,.06);margin-bottom:24px}
.section.active{display:block}
.section h2{font-size:16px;font-weight:600;margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid #eee}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{text-align:left;padding:8px 12px;border-bottom:1px solid #f0f0f0}
th{font-weight:600;color:#555;background:#fafafa;font-size:12px;text-transform:uppercase;letter-spacing:.3px}
td{color:#333}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500}
.tag-layer{background:#e8eaf6;color:#3949ab}
.tag-type{background:#f3e5f5;color:#7b1fa2}
details{margin:8px 0;border:1px solid #e0e0e0;border-radius:8px;overflow:hidden}
summary{padding:10px 16px;background:#fafafa;cursor:pointer;font-size:13px;font-weight:500;color:#333;user-select:none}
summary:hover{background:#f0f0f0}
details pre{padding:12px 16px;background:#1a1a2e;color:#e0e0e0;font-size:12px;overflow-x:auto;max-height:500px;overflow-y:auto;line-height:1.5}
.search-box{padding:8px 14px;border:1px solid #ddd;border-radius:8px;font-size:13px;width:200px;outline:none}
.search-box:focus{border-color:#1a1a2e}
.footer{text-align:center;padding:16px;font-size:12px;color:#aaa}
</style>
</head>
<body data-prd-tools-portal="reference">
<div class="topnav">
  <h1>Reference Portal</h1>
  <nav>{{NAV}}</nav>
</div>
<div class="container">
  <div class="cards">{{SUMMARY_CARDS}}</div>
  {{SECTIONS}}
</div>
<div class="footer">{{GENERATED_AT}}</div>
<script>
function showTab(id){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.topnav nav a').forEach(a=>a.classList.remove('active'));
  var el=document.getElementById(id);if(el)el.classList.add('active');
  var link=document.querySelector('[data-tab="'+id+'"]');if(link)link.classList.add('active');
}
function searchRaw(){
  var q=document.getElementById('rawSearch').value.toLowerCase();
  document.querySelectorAll('#raw-files details').forEach(function(d){
    var txt=d.textContent.toLowerCase();
    d.style.display=(!q||txt.indexOf(q)>=0)?'':'none';
  });
}
</script>
</body>
</html>
