# 01-entities.yaml
schema_version: "3.1"
tool_version: "<tool-version>"
layer: "<frontend|bff|backend|multi-layer>"
project: "<project>"
last_verified: "<YYYY-MM-DD>"
verify_cadence: "14d"
owner: "<team>"

enums:
  <EnumName>:
    definition_file: "<path:line>"
    values:
      - name: "<NAME>"
        value: "<value>"
        business_meaning: "<meaning>"
    evidence:
      - "EV-001"
    confidence: high

entities:
  - id: "<ENTITY-ID>"
    kind: "<component|schema_field|api|domain_object|model|validator|integration>"
    target_file: "<path>"
    code_symbol: "<symbol>"
    layer_fields: {}
    implemented: true
    evidence:
      - "EV-001"
    confidence: high

structures:
  - id: "<STRUCTURE-ID>"
    kind: "<type|interface|payload|db_model>"
    definition_file: "<path:line>"
    fields: []
    evidence: []
    confidence: medium
