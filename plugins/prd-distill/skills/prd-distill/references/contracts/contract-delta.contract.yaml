# Contract for context/contract-delta.yaml
# Source of truth: references/output-contracts.md §contract-delta
# NOTE: top-level key is `deltas` (matching actual LLM output), not `contracts`
artifact: "context/contract-delta.yaml"
schema_version: "2.0"
required_top_level:
  - meta
  - schema_version
  - deltas
rules:
  - id: "delta_has_full_stack"
    each: "deltas"
    required:
      - id
      - producer
      - consumers
      - change_type
      - alignment_status
      - requirement_id
      - layer
      - contract_surface

  - id: "consumers_is_array_of_layers"
    each: "deltas"
    require: "isinstance(consumers, list) and all(c in ['frontend','bff','backend','external'] for c in consumers)"
    note: "consumers must be an array of layer names, not a direction string"

  - id: "checked_by_optional_array"
    each: "deltas"
    when:
      field: "checked_by"
      exists: true
    require: "isinstance(checked_by, list)"
    note: "checked_by must be an array when present"

  - id: "alignment_summary_schema"
    path: "alignment_summary"
    required:
      - status
      - blockers
      - next_actions
    note: "alignment_summary 是'整体状态+阻塞+下一步'结构，不是各状态计数"
